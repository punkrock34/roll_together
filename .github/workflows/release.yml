name: Extension Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      AMO_API_KEY: ${{ secrets.AMO_API_KEY }}
      AMO_API_SECRET: ${{ secrets.AMO_API_SECRET }}
      CWS_EXTENSION_ID: ${{ vars.CWS_EXTENSION_ID }}
      CWS_PUBLISHER_ID: ${{ vars.CWS_PUBLISHER_ID }}
      CWS_SERVICE_ACCOUNT_KEY: ${{ secrets.CWS_SERVICE_ACCOUNT_KEY }}
      CWS_AUTO_PUBLISH: ${{ vars.CWS_AUTO_PUBLISH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Read package version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          EXPECTED_TAG="v${{ steps.version.outputs.value }}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${EXPECTED_TAG}."
            exit 1
          fi

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=v${{ steps.version.outputs.value }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: |
          npm run lint
          npm run check
          npm run test

      - name: Build release archives
        run: |
          npm run zip:chrome
          npm run zip:firefox

      - name: Sign Firefox XPI for self-distribution
        if: ${{ env.AMO_API_KEY != '' && env.AMO_API_SECRET != '' }}
        env:
          WEB_EXT_API_KEY: ${{ env.AMO_API_KEY }}
          WEB_EXT_API_SECRET: ${{ env.AMO_API_SECRET }}
        run: |
          set +e
          SIGN_OUTPUT="$(mktemp)"
          npx web-ext@8 sign \
            --channel=unlisted \
            --source-dir=.output/firefox-mv3 \
            --artifacts-dir=.output/signed-firefox \
            2>&1 | tee "${SIGN_OUTPUT}"
          SIGN_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ "${SIGN_EXIT_CODE}" -ne 0 ]; then
            if grep -q "Version ${{ steps.version.outputs.value }} already exists." "${SIGN_OUTPUT}"; then
              echo "Firefox version ${{ steps.version.outputs.value }} is already signed on AMO. Skipping re-sign on rerun."
              exit 0
            fi

            echo "Firefox signing failed."
            exit "${SIGN_EXIT_CODE}"
          fi

          SIGNED_XPI="$(find .output/signed-firefox -maxdepth 1 -type f -name '*.xpi' | head -n 1)"
          if [ -z "${SIGNED_XPI}" ]; then
            echo "Signed Firefox XPI was not created."
            exit 1
          fi

          cp "${SIGNED_XPI}" ".output/roll-together-extension-${{ steps.version.outputs.value }}-firefox-signed.xpi"

      - name: Collect release assets
        run: |
          mkdir -p .release-assets
          cp ".output/roll-together-extension-${{ steps.version.outputs.value }}-chrome.zip" .release-assets/
          cp ".output/roll-together-extension-${{ steps.version.outputs.value }}-firefox.zip" .release-assets/
          cp ".output/roll-together-extension-${{ steps.version.outputs.value }}-sources.zip" .release-assets/

          if [ -f ".output/roll-together-extension-${{ steps.version.outputs.value }}-firefox-signed.xpi" ]; then
            cp ".output/roll-together-extension-${{ steps.version.outputs.value }}-firefox-signed.xpi" .release-assets/
          fi

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.tag.outputs.value }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.tag.outputs.value }}" .release-assets/* --clobber
          else
            gh release create "${{ steps.tag.outputs.value }}" .release-assets/* \
              --title "Roll Together v${{ steps.version.outputs.value }}" \
              --target "${GITHUB_SHA}" \
              --generate-notes
          fi

      - name: Authenticate Chrome Web Store publisher
        id: chrome-auth
        if: ${{ env.CWS_EXTENSION_ID != '' && env.CWS_PUBLISHER_ID != '' && env.CWS_SERVICE_ACCOUNT_KEY != '' }}
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.CWS_SERVICE_ACCOUNT_KEY }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Upload Chrome package to Chrome Web Store
        id: chrome-upload
        if: ${{ steps.chrome-auth.outputs.access_token != '' }}
        continue-on-error: true
        env:
          CWS_ACCESS_TOKEN: ${{ steps.chrome-auth.outputs.access_token }}
        run: |
          ITEM_NAME="publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}"
          ARCHIVE=".output/roll-together-extension-${{ steps.version.outputs.value }}-chrome.zip"

          curl --fail-with-body \
            -H "Authorization: Bearer ${CWS_ACCESS_TOKEN}" \
            -X POST \
            -T "${ARCHIVE}" \
            "https://chromewebstore.googleapis.com/upload/v2/${ITEM_NAME}:upload"

      - name: Publish Chrome Web Store submission
        id: chrome-publish
        if: ${{ steps.chrome-auth.outputs.access_token != '' && env.CWS_AUTO_PUBLISH == 'true' }}
        continue-on-error: true
        env:
          CWS_ACCESS_TOKEN: ${{ steps.chrome-auth.outputs.access_token }}
        run: |
          ITEM_NAME="publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}"

          curl --fail-with-body \
            -H "Authorization: Bearer ${CWS_ACCESS_TOKEN}" \
            -X POST \
            "https://chromewebstore.googleapis.com/v2/${ITEM_NAME}:publish"

      - name: Report optional Chrome Web Store sync status
        if: ${{ always() && env.CWS_EXTENSION_ID != '' && env.CWS_PUBLISHER_ID != '' && env.CWS_SERVICE_ACCOUNT_KEY != '' }}
        run: |
          echo "Chrome auth outcome: ${{ steps.chrome-auth.outcome }}"
          echo "Chrome upload outcome: ${{ steps.chrome-upload.outcome }}"
          echo "Chrome publish outcome: ${{ steps.chrome-publish.outcome }}"

          if [ "${{ steps.chrome-auth.outcome }}" != "success" ]; then
            echo "::warning::Chrome Web Store auth failed. GitHub release assets were still created."
          elif [ "${{ steps.chrome-upload.outcome }}" != "success" ]; then
            echo "::warning::Chrome Web Store upload failed. GitHub release assets were still created."
          elif [ "${{ env.CWS_AUTO_PUBLISH }}" = "true" ] && [ "${{ steps.chrome-publish.outcome }}" != "success" ]; then
            echo "::warning::Chrome Web Store publish failed. GitHub release assets were still created."
          fi
